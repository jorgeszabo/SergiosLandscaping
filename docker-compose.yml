# ─────────────────────────────────────────────────────────────────────────────
# Self-hosting stack: the app + its own PostgreSQL database.
# Copy .env.example to .env and fill in the values, then:  docker compose up -d
# Secrets live only in .env (git-ignored) — never commit it. See
# docs/SELF_HOSTING.md.
# ─────────────────────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sergios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: sergios
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sergios -d sergios"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not published to the host by default — only the app reaches it over the
    # internal compose network. Uncomment to connect a DB tool from the host.
    # ports:
    #   - "5432:5432"

  app:
    build:
      context: .
      args:
        # Public, referrer-restricted browser key (not a secret). Optional —
        # leave blank to run without maps.
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sergios:${POSTGRES_PASSWORD}@db:5432/sergios
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
    ports:
      - "3000:3000"

volumes:
  dbdata:
